  固态电池:
    keywords: [固态电池, 半固态电池, 电解质]
    leaders: [赣锋锂业, 当升科技, 金龙羽, 上海洗霸]
  AI算力:
    keywords: [AI算力, 算力, GPU, 液冷, 数据中心]
    leaders: [浪潮信息, 中科曙光, 寒武纪, 工业富联]

# 数据源开关与权重
# credibility: 1-5,影响最终置信度(政府/官方=5,主流财经=4,聚合=3)
# 全部通过 RSSHub 接入,加新源改 src/sources/rss.py 即可
sources:
  # === 新闻类 ===
  cls:
    enabled: true
    credibility: 5
    category: news
    description: 财联社电报(RSSHub 路由 /cls/telegraph)
  kr37_newsflashes:
    enabled: true
    credibility: 4
    category: news
    description: 36氪 7x24 快讯
  wallstreetcn_global:
    enabled: true
    credibility: 4
    category: international
    description: 华尔街见闻全球资讯(国际新闻)
  # === 政策类(官方权威) ===
  cctv_xwlb:
    enabled: true
    credibility: 5
    category: policy
    description: 央视新闻联播(国家政策发布主渠道)
  cctv_news:
    enabled: true
    credibility: 5
    category: policy
    description: 央视新闻(补充政策报道)
  # === 已废弃(实测全部 503/404,保留兼容) ===
  eastmoney_news:
    enabled: false
    credibility: 4
    category: news
    description: 东方财富要闻(接口不稳,默认关)
  market_data:
    enabled: false
    credibility: 5
    category: market
    description: akshare 行情/北向/龙虎榜(默认关,大财经平台已有)

# LLM 配置
llm:
  provider: deepseek
  model: deepseek-chat
  max_tokens: 2000
  temperature: 0.1
  timeout: 60
  retry: 2

# 推送规则
push:
  min_importance: 3
  max_items: 8
  max_headline: 3
  max_important: 3
  max_normal: 2
  dedupe_window_hours: 48
  include_market_data: false
  include_international: true

# 简报标题
brief:
  title_prefix: "📊 A股财经早报"
  disclaimer: "本简报由 AI 自动整理公开信息生成,关注建议仅供参考,不构成任何投资建议。"
  timezone: "Asia/Shanghai"
  # 对话网页 URL(Cloudflare Pages 部署,网页+API 同域名)
  # Pages 域名 pages.dev 国内可达性优于 workers.dev
  # 留空则简报末尾不显示对话链接
  chat_url: "https://yaaaaaaa233.github.io/a-stock-brief/chat.html"

# 节假日(手动维护,akshare 也有交易日历可程序化判断)
# 格式: YYYY-MM-DD
holidays: []
