name: 每日财经早报

on:
  schedule:
    # UTC 23:45 = 北京时间 07:45,周一到周六(周日不开盘)
    # GitHub Actions cron 不保证准时,可能延迟 5-15 分钟
    # 设在 7:45 而非 8:00,延迟后仍在 8 点附近
    - cron: '45 23 * * 0-5'
  workflow_dispatch:
    # 手动触发,方便测试

permissions:
  contents: write   # 用于自动 commit 日志

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行早报任务
        env:
          # WxPusher(推荐,推送到父母微信)
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          # 钉钉(备选)
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          # 企业微信(备选)
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          # LLM API
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TZ: Asia/Shanghai
        run: python -m src.main

      - name: 归档日志到 git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ state/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无更新"
          else
            git commit -m "chore: 归档 $(date -u -d '+8 hours' +%Y-%m-%d) 早报"
            git push
          fi

      - name: 同步到 Cloudflare KV(对话网页加速)
        if: success() && env.CF_API_TOKEN != ''
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
        run: python -m web.sync_to_kv

      - name: 上传运行状态(可选)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-state
          path: state/
          retention-days: 7
