<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07c160">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="财经助手">
<title>财经助手</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
[hidden] { display: none !important; }
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-soft: #555;
  --text-faint: #888;
  --primary: #07c160;
  --primary-soft: #e6f9ee;
  --primary-dark: #06ad56;
  --border: #e0e0e0;
  --bubble-ai: #ffffff;
  --bubble-user: #95ec69;
  --warn: #fa9d3b;
  --danger: #ff4d4f;
}
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior: none;
}
body { height: 100vh; height: 100dvh; overflow: hidden; }
.container {
  max-width: 720px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}
header {
  background: var(--card);
  padding: calc(12px + env(safe-area-inset-top)) 14px 10px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.icon-btn {
  width: 40px;
  height: 40px;
  border: none;
  background: transparent;
  font-size: 22px;
  color: var(--text-soft);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}
.icon-btn:active { background: var(--bg); }
.sub {
  font-size: 14px;
  color: var(--text-soft);
  margin-top: 2px;
  line-height: 1.4;
}
.skills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 0 2px;
  scrollbar-width: none;
  margin: 0 -14px;
  padding-left: 14px;
  padding-right: 14px;
}
.skills::-webkit-scrollbar { display: none; }
.skill-btn {
  flex-shrink: 0;
  padding: 10px 18px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: inherit;
}
.skill-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(7, 193, 96, 0.25);
}
.skill-btn:active { transform: scale(0.96); }
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px 12px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.msg {
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  max-width: 88%;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.ai { align-self: flex-start; }
.msg.user {
  align-self: flex-end;
  align-items: flex-end;
}
.role {
  font-size: 13px;
  color: var(--text-faint);
  margin-bottom: 4px;
  padding: 0 6px;
}
.bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 17px;
  word-wrap: break-word;
  word-break: break-word;
  white-space: pre-wrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  line-height: 1.6;
}
.msg.ai .bubble {
  background: var(--bubble-ai);
  border-top-left-radius: 4px;
  color: var(--text);
}
.msg.user .bubble {
  background: var(--bubble-user);
  border-top-right-radius: 4px;
}
.bubble strong { font-weight: 700; }
.bubble a { color: var(--primary-dark); }
.bubble code {
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 15px;
}
.typing-bubble {
  padding: 14px 18px;
  background: var(--bubble-ai);
  border-radius: 16px;
  border-top-left-radius: 4px;
}
.typing-bubble span {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #aaa;
  border-radius: 50%;
  margin: 0 2px;
  animation: blink 1.4s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-3px); }
}
.quick-replies {
  flex-shrink: 0;
  padding: 8px 14px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--card);
  border-top: 1px solid var(--border);
}
.quick-replies::-webkit-scrollbar { display: none; }
.quick-replies button {
  flex-shrink: 0;
  padding: 8px 14px;
  background: var(--primary-soft);
  border: 1px solid var(--primary);
  color: var(--primary-dark);
  border-radius: 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.quick-replies button:active {
  background: var(--primary);
  color: white;
}
.input-bar {
  background: var(--card);
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
}
.input-wrap {
  flex: 1;
  position: relative;
}
#input {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 12px 16px;
  font-size: 17px;
  font-family: inherit;
  resize: none;
  max-height: 120px;
  min-height: 46px;
  outline: none;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
#input:focus {
  border-color: var(--primary);
  background: white;
}
.send-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.send-btn:active { transform: scale(0.92); }
.send-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.error-banner {
  background: #fff5f5;
  color: var(--danger);
  padding: 12px 14px;
  font-size: 14px;
  text-align: center;
  border-bottom: 1px solid #fcc;
}
.onboarding {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.onboarding-card {
  background: white;
  border-radius: 16px;
  padding: 24px 22px;
  max-width: 360px;
  width: 100%;
}
.onboarding-card h2 {
  font-size: 20px;
  margin-bottom: 12px;
}
.onboarding-card p {
  font-size: 16px;
  color: var(--text-soft);
  margin-bottom: 8px;
  line-height: 1.6;
}
.onboarding-card ul {
  padding-left: 20px;
  margin-bottom: 16px;
  color: var(--text-soft);
}
.onboarding-card li {
  font-size: 15px;
  margin-bottom: 6px;
}
.onboarding-card button {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.disclaimer {
  padding: 8px 14px;
  font-size: 12px;
  color: var(--text-faint);
  text-align: center;
  background: var(--card);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
@media (min-width: 768px) {
  body { font-size: 19px; }
  .bubble { font-size: 18px; }
  .skill-btn { font-size: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-row">
      <h1>📊 财经助手</h1>
      <button class="icon-btn" id="clear-btn" title="清空对话" aria-label="清空对话">🗑</button>
    </div>
    <div class="sub" id="skill-desc">加载中...</div>
    <div class="skills" id="skills"></div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="quick-replies" id="quick-replies"></div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="输入你的问题..." autocomplete="off" autocapitalize="off"></textarea>
    </div>
    <button class="send-btn" id="send" aria-label="发送">↑</button>
  </div>

  <div class="disclaimer">基于 AI 整理公开信息 · 不构成投资建议</div>
</div>

<div class="onboarding" id="onboarding" hidden>
  <div class="onboarding-card">
    <h2>👋 你好</h2>
    <p>我是财经助手,可以帮你:</p>
    <ul>
      <li>💬 解读今天的早报内容</li>
      <li>🏭 查询板块龙头股</li>
      <li>📜 用大白话解释政策</li>
      <li>📚 科普财经名词</li>
      <li>🗓 回顾过去几天的资讯</li>
    </ul>
    <p style="font-size:14px;color:#888">在顶部切换不同模式。任何问题都可以问。</p>
    <button id="onboarding-ok">开始使用</button>
  </div>
</div>

<script>
// API 地址优先级:URL 参数 ?api=xxx > localStorage > 同源(默认)
function resolveApiBase() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('api');
  if (fromUrl) {
    try { localStorage.setItem('a-stock-api', fromUrl); } catch {}
    return fromUrl.replace(/\/$/, '');
  }
  try {
    const saved = localStorage.getItem('a-stock-api');
    if (saved) return saved.replace(/\/$/, '');
  } catch {}
  return window.location.origin;
}
const API_BASE = resolveApiBase();
const STORE_KEY = 'a-stock-chat-history';

const state = {
  skills: [],
  currentSkill: null,
  history: [],
  loading: false,
};

const $ = (id) => document.getElementById(id);
const $skills = $('skills');
const $skillDesc = $('skill-desc');
const $chat = $('chat');
const $input = $('input');
const $send = $('send');
const $quick = $('quick-replies');
const $clear = $('clear-btn');
const $onboarding = $('onboarding');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function renderMarkdown(text) {
  let s = escapeHtml(text);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`([^`]+?)`/g, '<code>$1</code>');
  return s;
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveHistory() {
  try {
    const all = loadHistory();
    all[state.currentSkill] = state.history.slice(-50);
    localStorage.setItem(STORE_KEY, JSON.stringify(all));
  } catch {}
}

function clearHistory() {
  if (!confirm('确定清空当前模式的对话?')) return;
  state.history = [];
  const all = loadHistory();
  if (state.currentSkill) delete all[state.currentSkill];
  try { localStorage.setItem(STORE_KEY, JSON.stringify(all)); } catch {}
  renderHistory();
  if (state.currentSkill) {
    const s = state.skills.find(x => x.id === state.currentSkill);
    if (s?.greeting) addMessage('ai', s.greeting, false);
  }
}

function addMessage(role, text, save = true) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <div class="role">${role === 'ai' ? '助手' : '我'}</div>
    <div class="bubble">${renderMarkdown(text)}</div>
  `;
  $chat.appendChild(msg);
  if (save) state.history.push({ role, content: text });
  scrollToBottom();
  return msg;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'typing-msg';
  msg.innerHTML = `
    <div class="role">助手</div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>
  `;
  $chat.appendChild(msg);
  scrollToBottom();
}

function removeTyping() {
  const t = $('typing-msg');
  if (t) t.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    $chat.scrollTop = $chat.scrollHeight;
  });
}

function showError(msg) {
  const banner = document.createElement('div');
  banner.className = 'error-banner';
  banner.textContent = msg;
  document.querySelector('header').after(banner);
  setTimeout(() => banner.remove(), 4000);
}

function friendlyError(e) {
  const msg = e.message || '';
  if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
    return '网络不太顺畅,请检查网络后重试';
  }
  if (msg.includes('DeepSeek')) return 'AI 服务暂时不可用,稍后再试';
  if (msg.includes('GitHub')) return '读取早报失败,稍后再试';
  if (msg.includes('DEEPSEEK_API_KEY')) return '服务配置异常,请联系管理员';
  return '出错了,请稍后再试或换个问法';
}

async function loadSkills() {
  try {
    const r = await fetch(API_BASE + '/api/skills');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    state.skills = data.skills || [];
    renderSkills();
    const def = state.skills.find(s => s.default) || state.skills[0];
    if (def) selectSkill(def.id);
  } catch (e) {
    showError('无法连接服务,请检查网络');
    $skillDesc.textContent = '⚠️ 服务连接失败';
  }
}

function renderSkills() {
  $skills.innerHTML = '';
  for (const s of state.skills) {
    const btn = document.createElement('button');
    btn.className = 'skill-btn';
    btn.dataset.id = s.id;
    btn.textContent = `${s.icon} ${s.name}`;
    btn.onclick = () => selectSkill(s.id);
    $skills.appendChild(btn);
  }
}

function selectSkill(id) {
  if (state.loading) return;
  state.currentSkill = id;
  document.querySelectorAll('.skill-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  const s = state.skills.find(x => x.id === id);
  if (s) {
    $skillDesc.textContent = s.description;
    document.title = `${s.icon} ${s.name}`;
    $quick.innerHTML = '';
    (s.quickReplies || []).forEach(q => {
      const b = document.createElement('button');
      b.textContent = q;
      b.onclick = () => { $input.value = q; send(); };
      $quick.appendChild(b);
    });
  }
  state.history = [];
  $chat.innerHTML = '';
  const saved = loadHistory()[id] || [];
  if (saved.length > 0) {
    state.history = saved;
    renderHistory();
    addMessage('ai', '_(以上是历史对话,继续问即可)_', false);
  } else if (s?.greeting) {
    addMessage('ai', s.greeting, false);
  }
  $input.focus();
}

function renderHistory() {
  $chat.innerHTML = '';
  for (const m of state.history) {
    const msg = document.createElement('div');
    msg.className = `msg ${m.role === 'user' ? 'user' : 'ai'}`;
    msg.innerHTML = `
      <div class="role">${m.role === 'user' ? '我' : '助手'}</div>
      <div class="bubble">${renderMarkdown(m.content)}</div>
    `;
    $chat.appendChild(msg);
  }
  scrollToBottom();
}

async function send() {
  const text = $input.value.trim();
  if (!text || state.loading) return;
  if (!state.currentSkill) {
    showError('请先选择上方一个模式');
    return;
  }
  if (!navigator.onLine) {
    showError('当前没有网络,请检查后重试');
    return;
  }
  addMessage('user', text);
  $input.value = '';
  $input.style.height = 'auto';
  $send.disabled = true;
  state.loading = true;
  addTyping();

  try {
    const r = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        skill: state.currentSkill,
        message: text,
        history: state.history.slice(-10),
      }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    removeTyping();
    addMessage('ai', data.reply);
    saveHistory();
  } catch (e) {
    removeTyping();
    addMessage('ai', '⚠️ ' + friendlyError(e));
  } finally {
    state.loading = false;
    $send.disabled = false;
  }
}

$send.onclick = send;
$clear.onclick = clearHistory;

$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});
$input.addEventListener('focus', () => {
  setTimeout(scrollToBottom, 300);
});

if (!localStorage.getItem('a-stock-onboarded')) {
  $onboarding.hidden = false;
  $('onboarding-ok').onclick = () => {
    $onboarding.hidden = true;
    localStorage.setItem('a-stock-onboarded', '1');
  };
}

loadSkills();
</script>
</body>
</html>
