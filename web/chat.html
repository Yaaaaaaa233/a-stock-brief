<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>财经助手</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
[hidden] { display: none !important; }
:root {
  --bg: #ffffff;
  --text: #1a1a1a;
  --text-soft: #6b6b6b;
  --text-faint: #999;
  --border: #e8e8e8;
  --user-bubble: #f5f5f5;
  --ai-bubble: #ffffff;
  --primary: #1a1a1a;
  --link: #0066cc;
}
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior: none;
}
body { height: 100vh; height: 100dvh; overflow: hidden; }
.container {
  max-width: 720px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
header {
  padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
}
header .title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.2px;
}
header .clear-btn {
  border: none;
  background: transparent;
  color: var(--text-faint);
  font-size: 14px;
  cursor: pointer;
  padding: 6px 10px;
  font-family: inherit;
}
header .clear-btn:active { color: var(--text); }
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  -webkit-overflow-scrolling: touch;
}
.empty-state {
  text-align: center;
  padding: 60px 20px 30px;
  color: var(--text-soft);
}
.empty-state h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-state p {
  font-size: 15px;
  line-height: 1.6;
}
.suggestions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 24px;
  padding: 0 4px;
}
.suggestion {
  text-align: left;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-size: 15px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.suggestion:active { background: var(--user-bubble); }
.msg {
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user {
  align-items: flex-end;
}
.msg .role {
  font-size: 12px;
  color: var(--text-faint);
  margin-bottom: 4px;
  padding: 0 4px;
}
.msg .bubble {
  padding: 12px 16px;
  border-radius: 14px;
  max-width: 88%;
  white-space: pre-wrap;
  word-wrap: break-word;
  word-break: break-word;
  line-height: 1.65;
  font-size: 16px;
}
.msg.ai .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}
.msg.user .bubble {
  background: var(--user-bubble);
  border-top-right-radius: 4px;
  color: var(--text);
}
.msg .bubble strong { font-weight: 600; }
.msg .bubble a { color: var(--link); }
.msg .bubble code {
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 14px;
}
.typing-bubble {
  color: var(--text-faint);
  font-style: italic;
}
.input-bar {
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--bg);
}
.input-wrap {
  flex: 1;
  position: relative;
}
#input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 11px 16px;
  font-size: 17px;
  font-family: inherit;
  resize: none;
  outline: none;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 44px;
  max-height: 120px;
}
#input:focus {
  border-color: var(--primary);
}
.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.send-btn:active { opacity: 0.7; }
.send-btn:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.error-msg {
  color: #c33;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">财经助手</div>
    <button class="clear-btn" id="clear-btn" hidden>清空</button>
  </header>

  <div class="chat" id="chat">
    <div class="empty-state" id="empty">
      <h2>财经助手</h2>
      <p>基于今日早报回答你的问题<br>财经政策、概念、板块都可以问</p>
      <div class="suggestions">
        <button class="suggestion" data-q="今天早报讲了什么?">今天早报讲了什么?</button>
        <button class="suggestion" data-q="今天有什么值得关注的政策?">今天有什么值得关注的政策?</button>
        <button class="suggestion" data-q="新能源板块有哪些龙头股?">新能源板块有哪些龙头股?</button>
        <button class="suggestion" data-q="什么是北向资金?">什么是北向资金?</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="问点什么..." autocomplete="off"></textarea>
    </div>
    <button class="send-btn" id="send" aria-label="发送">↑</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const state = { history: [], loading: false };

const $ = id => document.getElementById(id);
const $chat = $('chat');
const $input = $('input');
const $send = $('send');
const $clear = $('clear-btn');
const $empty = $('empty');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderMd(text) {
  let s = escapeHtml(text);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/`([^`]+?)`/g, '<code>$1</code>');
  return s;
}
function hideEmpty() {
  if ($empty) $empty.hidden = true;
  $clear.hidden = false;
}
function addMessage(role, text) {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <div class="role">${role === 'user' ? '我' : '助手'}</div>
    <div class="bubble">${renderMd(text)}</div>
  `;
  $chat.appendChild(msg);
  state.history.push({ role, content: text });
  requestAnimationFrame(() => $chat.scrollTop = $chat.scrollHeight);
}
function addTyping() {
  hideEmpty();
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'typing-msg';
  msg.innerHTML = `
    <div class="role">助手</div>
    <div class="bubble typing-bubble">思考中...</div>
  `;
  $chat.appendChild(msg);
  $chat.scrollTop = $chat.scrollHeight;
}
function removeTyping() {
  const t = $('typing-msg');
  if (t) t.remove();
}
function friendlyError(e) {
  const m = e.message || '';
  if (m.includes('Failed to fetch') || m.includes('NetworkError')) return '网络异常,请稍后再试';
  if (m.includes('DeepSeek')) return 'AI 服务繁忙,请稍后再试';
  return '出错了: ' + m;
}

async function send(text) {
  if (typeof text !== 'string') text = $input.value.trim();
  if (!text || state.loading) return;
  if (!navigator.onLine) {
    addMessage('ai', '当前没有网络,请检查后重试。');
    return;
  }
  addMessage('user', text);
  $input.value = '';
  $input.style.height = 'auto';
  $send.disabled = true;
  state.loading = true;
  addTyping();

  try {
    const r = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        history: state.history.slice(-10),
      }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const data = await r.json();
    removeTyping();
    addMessage('ai', data.reply);
  } catch (e) {
    removeTyping();
    addMessage('ai', friendlyError(e));
  } finally {
    state.loading = false;
    $send.disabled = false;
    $input.focus();
  }
}

$send.onclick = () => send();
$clear.onclick = () => {
  if (!confirm('清空当前对话?')) return;
  state.history = [];
  $chat.innerHTML = '';
  $chat.appendChild($empty);
  $empty.hidden = false;
  $clear.hidden = true;
};
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send();
  }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});
$input.addEventListener('focus', () => {
  setTimeout(() => $chat.scrollTop = $chat.scrollHeight, 300);
});

document.addEventListener('click', e => {
  const btn = e.target.closest('.suggestion');
  if (btn) send(btn.dataset.q);
});
</script>
</body>
</html>
